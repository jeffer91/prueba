<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Auditor App</title>
  <link rel="stylesheet" href="./styles/global.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">VA</div>
        <div>
          <h1>Video Auditor</h1>
          <p>App local inteligente</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-screen="inicio">Inicio</button>
        <button class="nav-item" data-screen="importar">Importar video</button>
        <button class="nav-item" data-screen="biblioteca">Biblioteca</button>
        <button class="nav-item" data-screen="comparacion">Comparación</button>
        <button class="nav-item" data-screen="plantillas">Plantillas</button>
        <button class="nav-item" data-screen="diagnostico">Diagnóstico</button>
      </nav>

      <div class="sidebar-footer">
        <span class="status-dot"></span>
        <span id="electronStatus">Verificando Electron...</span>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h2 id="screenTitle">Inicio</h2>
          <p id="screenSubtitle">Base inicial de la app local para auditar videos.</p>
        </div>
        <button id="btnTestElectron" class="primary-button">Estado de la app</button>
      </header>

      <section id="screenContainer" class="screen-container"></section>

      <section class="console-panel">
        <div class="console-header">
          <h4>Diagnóstico</h4>
          <span>Electron / SQLite / Local</span>
        </div>
        <pre id="diagnosticOutput">Esperando inicialización...</pre>
      </section>
    </main>
  </div>

  <script src="./scripts/renderer.js"></script>
</body>
</html>
